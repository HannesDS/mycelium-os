company:
  name: "Acme AI Co"
  instance: production

shrooms:
  - id: sales-shroom
    role: "Sales Development"
    model: mistral-7b
    can:
      - read: [crm, emails]
      - write: [draft_emails, crm_notes]
      - propose: [send_email, book_meeting]
    cannot:
      - execute: [send_email, payments]
    escalates_to: ceo-shroom
    sla_response_minutes: 60
  - id: delivery-shroom
    role: "Delivery Lead"
    escalates_to: ceo-shroom
  - id: billing-shroom
    role: "Billing & Finance"
    escalates_to: ceo-shroom
  - id: compliance-shroom
    role: "Compliance & Legal"
    escalates_to: ceo-shroom
  - id: ceo-shroom
    role: "CEO / Decider"
    escalates_to: human

graph:
  edges:
    - from: sales-shroom
      to: ceo-shroom
      type: reports-to
    - from: delivery-shroom
      to: ceo-shroom
      type: reports-to
    - from: billing-shroom
      to: ceo-shroom
      type: reports-to
    - from: compliance-shroom
      to: ceo-shroom
      type: reports-to
